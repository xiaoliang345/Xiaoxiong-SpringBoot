spring:
  application: xiaoxiong
  spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/xiaoxiong
    username: ${db.username}
    password: ${db.password}
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm
    time-zone: GMT+8
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  #允许跨域的地址
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*

server:
  port: 8801
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    title: 接口文档
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.oxn.xiaoxiong.controller

tencent:
  cos:
    secret-id: ${cos.client.secretId}
    secret-key: ${cos.client.secretKey}
    region: ${cos.client.region}
    bucket-name: ${cos.client.bucket}

sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: xiaoxiong-token
  # token 有效期（单位：秒），-1 代表永久有效
  timeout: 3600